services:
  postgres:
    image: postgres:16-alpine
    container_name: dispatch_queue_postgres
    environment:
      POSTGRES_USER: dispatch
      POSTGRES_PASSWORD: dispatch
      POSTGRES_DB: dispatch_queue

    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dispatch -d dispatch_queue"]
      interval: 5s
      timeout: 3s
      retries: 5


volumes:
  postgres_data:
